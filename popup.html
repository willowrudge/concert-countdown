<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Concert Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="setup-view" class="view">
      <div class="brand"> concert countdown</div>
      <h1>What's your next show?</h1>
      <input type="text" id="name" placeholder="Event name" />
      <input type="date" id="date" />
      <input type="text" id="location" placeholder="Location (optional)" />
      <input type="url" id="playlist" placeholder="Spotify playlist URL" />
      <button id="save">Continue</button>
    </div>

    <div id="spotify-view" class="view hidden">
      <div class="brand"> concert countdown</div>
      <h1>Connect Spotify</h1>
      <p>Link Spotify to control music from the overlay. Premium required.</p>
      <button id="connect-spotify" class="spotify-btn">Connect with Spotify</button>
      <button id="skip-spotify" class="skip-btn">Skip for now</button>
    </div>

    <div id="countdown-view" class="view hidden">
      <div class="brand"> concert countdown</div>
      <div class="status-pill">● Live</div>
      <div class="event-name" id="popup-event-name"></div>
      <div class="popup-date" id="popup-date"></div>
      <div class="popup-location" id="popup-location"></div>
      <div class="popup-actions">
        <button id="reset" class="ghost-btn">Change event</button>
        <button id="reconnect" class="ghost-btn">Reconnect Spotify</button>
      </div>
    </div>

    <script src="auth.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
